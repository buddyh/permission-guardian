name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build binaries
        run: |
          mkdir -p dist

          # Darwin (macOS)
          GOOS=darwin GOARCH=amd64 go build -ldflags="-s -w" -o dist/pg-darwin-amd64 ./cmd/pg
          GOOS=darwin GOARCH=arm64 go build -ldflags="-s -w" -o dist/pg-darwin-arm64 ./cmd/pg

          # Linux
          GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o dist/pg-linux-amd64 ./cmd/pg
          GOOS=linux GOARCH=arm64 go build -ldflags="-s -w" -o dist/pg-linux-arm64 ./cmd/pg

          # Create checksums
          cd dist && sha256sum * > checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
          files: |
            dist/pg-darwin-amd64
            dist/pg-darwin-arm64
            dist/pg-linux-amd64
            dist/pg-linux-arm64
            dist/checksums.txt
